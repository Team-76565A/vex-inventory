<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure VEX Inventory</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e11d48; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Login Overlay */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 41, 59, 0.95); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        
        /* Main App (Hidden by default) */
        #app-content { display: none; }
        
        nav { background: #1e293b; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 2rem; }
        
        input, select, textarea { width: 100%; padding: 0.75rem; margin: 0.5rem 0 1rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button.primary { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; }
        button.outline { background: none; border: 1px solid #94a3b8; color: white; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.8rem; border-bottom: 1px solid #f1f5f9; }
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-card">
        <h2 style="margin-top:0">VEX Inventory Login</h2>
        <p style="color: #64748b; font-size: 0.9rem;">Please sign in to manage parts.</p>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="primary">Sign In</button>
        </form>
        <p id="login-error" style="color:red; font-size: 0.8rem; margin-top: 1rem; display:none"></p>
    </div>
</div>

<div id="app-content">
    <nav>
        <div style="font-weight:800">VEX PRO <span style="font-weight:400; color:#94a3b8">| SECURE</span></div>
        <div style="display:flex; gap: 15px; align-items:center">
            <button onclick="showView('inventory')" style="color:white; background:none; border:none; cursor:pointer">Inventory</button>
            <button onclick="showView('reference')" style="color:white; background:none; border:none; cursor:pointer">Catalog</button>
            <button class="outline" onclick="handleLogout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div id="view-inventory" class="view active">
            <div class="card">
                <h3>Update Stock</h3>
                <form id="stock-form">
                    <select id="inv-part" required></select>
                    <input type="number" id="inv-qty" placeholder="Quantity" required>
                    <button type="submit" class="primary">Save Changes</button>
                </form>
            </div>
            <div class="card">
                <h3>Current Inventory</h3>
                <table id="inv-table">
                    <thead><tr><th>Part</th><th>Qty</th><th>Modified</th></tr></thead>
                    <tbody id="inventory-list"></tbody>
                </table>
            </div>
        </div>

        <div id="view-reference" class="view">
            <div class="card">
                <h3>Parts Reference</h3>
                <table id="ref-table">
                    <thead><tr><th>SKU</th><th>Name</th><th>Category</th></tr></thead>
                    <tbody id="reference-list"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // --- SUPABASE CONFIG ---
    const SB_URL = 'https://jfsdjqtnhjmujuzxuiix.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impmc2RqcXRuaGptdWp1enh1aWl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MjU2MTUsImV4cCI6MjA4ODIwMTYxNX0.m4lkyrIRdkiiUZEneTA3oc8O14dRepbyFCOAogsSbGk';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // --- AUTH LOGIC ---
    const loginForm = document.getElementById('login-form');
    const authOverlay = document.getElementById('auth-overlay');
    const appContent = document.getElementById('app-content');

    // Check if user is already logged in
    async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            showApp();
        }
    }

    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if (error) {
            document.getElementById('login-error').textContent = error.message;
            document.getElementById('login-error').style.display = 'block';
        } else {
            showApp();
        }
    };

    async function handleLogout() {
        await supabaseClient.auth.signOut();
        location.reload();
    }

    function showApp() {
        authOverlay.style.display = 'none';
        appContent.style.display = 'block';
        initData();
    }

    // --- DATA LOGIC ---
    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${v}`).classList.add('active');
    }

    async function initData() {
        const { data: parts } = await supabaseClient.from('parts').select('*').order('name');
        if (parts) {
            const select = document.getElementById('inv-part');
            select.innerHTML = parts.map(p => `<option value="${p.id}">${p.sku} - ${p.name}</option>`).join('');
            
            document.getElementById('reference-list').innerHTML = parts.map(p => `
                <tr><td>${p.sku}</td><td>${p.name}</td><td>${p.category}</td></tr>
            `).join('');
        }
        fetchInventory();
    }

    async function fetchInventory() {
        const { data } = await supabaseClient.from('inventory_details').select('*');
        if (data) {
            document.getElementById('inventory-list').innerHTML = data.map(i => `
                <tr><td>${i.part_name}</td><td>${i.quantity}</td><td>${new Date(i.modified_at).toLocaleDateString()}</td></tr>
            `).join('');
        }
    }

    document.getElementById('stock-form').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await supabaseClient.from('inventory').upsert({
            part_id: document.getElementById('inv-part').value,
            quantity: parseInt(document.getElementById('inv-qty').value),
            modified_at: new Date().toISOString()
        }, { onConflict: 'part_id' });
        
        if (!error) { fetchInventory(); e.target.reset(); }
    };

    checkUser();
</script>
</body>
</html>
